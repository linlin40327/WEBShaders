<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shader Test</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="canvas-container"></div>

  <div id="top-actions">
    <div class="top-actions-left">
      <button id="drawer-toggle" class="drawer-toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <button id="camera-btn" class="icon-btn" title="摄像头开关">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
      </button>
    </div>

    <div class="top-actions-right">
      <button id="add-btn" class="icon-btn" title="新建着色器">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button id="reset-btn" class="icon-btn" title="重新加载当前着色器">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" pathLength="1"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" pathLength="1"></path>
        </svg>
      </button>
    </div>
  </div>

  <nav id="drawer" class="drawer">
    <div class="drawer-header">
      <h2 class="drawer-title">Shaders</h2>
      <button id="add-collection-btn" class="icon-btn" title="新建收录" style="width:32px;height:32px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          <line x1="12" y1="11" x2="12" y2="17"></line>
          <line x1="9" y1="14" x2="15" y2="14"></line>
        </svg>
      </button>
    </div>
    <ul id="shader-list" class="shader-list"></ul>
  </nav>

  <div id="drawer-overlay" class="drawer-overlay"></div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="modal-title" class="modal-title">新建着色器</h3>
      <input id="modal-input" class="modal-input" type="text" placeholder="输入文件夹名称..." autofocus>
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-btn modal-btn-cancel">取消</button>
        <button id="modal-confirm-sub" class="modal-btn modal-btn-sub" style="display:none">子着色器</button>
        <button id="modal-confirm" class="modal-btn modal-btn-confirm">确认</button>
      </div>
      <p id="modal-error" class="modal-error hidden"></p>
    </div>
  </div>

  <div id="delete-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3 class="modal-title">确认删除</h3>
      <p id="delete-modal-msg" class="delete-modal-msg"></p>
      <div class="modal-actions">
        <button id="delete-modal-cancel" class="modal-btn modal-btn-cancel">取消</button>
        <button id="delete-modal-confirm" class="modal-btn modal-btn-danger">删除</button>
      </div>
    </div>
  </div>

  <div id="rename-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3 class="modal-title">重命名</h3>
      <input id="rename-modal-input" class="modal-input" type="text" placeholder="输入新名称..." autofocus>
      <div class="modal-actions">
        <button id="rename-modal-cancel" class="modal-btn modal-btn-cancel">取消</button>
        <button id="rename-modal-confirm" class="modal-btn modal-btn-confirm">确认</button>
      </div>
      <p id="rename-modal-error" class="modal-error hidden"></p>
    </div>
  </div>

  <div id="bottom-panel" class="bottom-panel">
    <div id="panel-handle" class="panel-handle">
      <div class="panel-handle-bar"></div>
    </div>
    <div id="panel-body" class="panel-body">
      <div class="panel-left">
        <div class="panel-timeline-row">
          <input id="panel-timeline" class="panel-timeline" type="range" min="0" max="10" step="0.01" value="0">
          <span id="panel-time-display" class="panel-time-display">0.00s</span>
        </div>
        <div class="panel-controls-row">
          <button id="panel-time-reset-btn" class="panel-btn" title="回到初始时间">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="19 20 9 12 19 4 19 20"></polygon>
              <line x1="5" y1="4" x2="5" y2="20"></line>
            </svg>
          </button>
          <button id="panel-time-pause-btn" class="panel-btn" title="暂停/播放">
            <svg id="panel-pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
            <svg id="panel-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </button>
          <button id="panel-time-speed-btn" class="panel-btn panel-speed-btn" title="切换倍速">1×</button>
        </div>
      </div>
      <div class="panel-right">
        <div class="panel-section-title">Uniforms</div>
        <div id="uniform-list" class="uniform-list"></div>
        <div id="panel-collapse-hint" class="panel-collapse-hint hidden">
          <span class="panel-collapse-text">收起面板</span>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/": "/node_modules/three/"
    }
  }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
